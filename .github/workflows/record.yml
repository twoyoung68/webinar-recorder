name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright supabase firebase-admin python-dotenv pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # --- [여기가 핵심] 마이크로소프트 공식 Playwright 설치 도구 사용 ---
      - name: Playwright 브라우저 및 시스템 의존성 설치
        run: |
          # 파이썬 경로 문제를 피하기 위해 npx(노드 실행기)로 브라우저를 먼저 깝니다.
          npx playwright install chromium --with-deps

      - name: 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # 현재 활성화된 파이썬 실행 경로를 직접 찍어서 실행합니다.
          $(which python) scheduler.py