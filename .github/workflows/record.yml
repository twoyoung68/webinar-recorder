name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 1. 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright supabase firebase-admin python-dotenv pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # --- [이 부분이 마법의 구간입니다] ---
      - name: 2. Playwright 공식 브라우저 및 의존성 설치
        # 마이크로소프트에서 만든 공식 액션을 사용하면 경로 문제를 알아서 해결해줍니다.
        uses: microsoft/playwright-github-action@v1

      - name: 3. 브라우저 엔진 설치 확인
        run: npx playwright install chromium --with-deps
      # ------------------------------------

      - name: 4. 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # 현재 환경에서 활성화된 파이썬(setup-python이 잡아준 것)으로 실행
          python scheduler.py