name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 가상 환경 구축 및 라이브러리 설치
        run: |
          # 1. 가상 환경 생성 및 활성화 후 설치
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install playwright supabase firebase-admin python-dotenv pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
          # 2. 브라우저 및 의존성 설치 (가상 환경 내부의 playwright 사용)
          playwright install chromium
          sudo ./venv/bin/python -m playwright install-deps

      - name: 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # 가상 환경의 파이썬으로 실행하여 경로 문제 완전 해결
          source venv/bin/activate
          python scheduler.py