name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 설치 속도 향상을 위한 캐시 활성화

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 만약 requirements.txt에 누락되었을 경우를 대비해 직접 설치
          pip install playwright supabase firebase-admin python-dotenv pytz

      - name: 브라우저 및 의존성 설치
        run: |
          # python -m 을 붙여서 현재 환경의 playwright 모듈을 확실히 실행
          python -m playwright install chromium
          sudo python -m playwright install-deps

      - name: 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scheduler.py