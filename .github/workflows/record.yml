name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 통합 설치 및 브라우저 세팅 (한 번에 실행)
        run: |
          # 1. 라이브러리 설치
          python -m pip install --upgrade pip
          pip install playwright supabase firebase-admin python-dotenv pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
          # 2. [가장 중요] 설치 직후 이 Step 안에서 바로 브라우저와 의존성 설치
          # 이렇게 해야 'No module named playwright' 에러를 피할 수 있습니다.
          python -m playwright install chromium --with-deps
          
      - name: 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scheduler.py