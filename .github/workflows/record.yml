name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 통합 라이브러리 및 브라우저 설치
        run: |
          # 1. 라이브러리 설치 및 경로 강제 인식
          python -m pip install --upgrade pip
          pip install playwright supabase firebase-admin python-dotenv pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
          # 2. [핵심] 설치된 패키지 경로를 현재 셸 세션에 강제 주입
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          # 3. 브라우저 및 의존성 설치 (python -m 을 붙여 현재 파이썬 환경 고정)
          python -m playwright install chromium --with-deps

      - name: 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # 실행 시에도 현재 설치된 환경을 명확히 지정
          python scheduler.py