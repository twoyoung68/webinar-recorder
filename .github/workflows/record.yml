name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 가상 환경 및 의존성 완벽 설치
        run: |
          # 1. 가상 환경 생성 및 활성화
          python -m venv venv
          source venv/bin/activate
          
          # 2. 필수 패키지 설치
          pip install --upgrade pip
          pip install playwright supabase firebase-admin python-dotenv pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
          # 3. 브라우저 설치
          playwright install chromium
          
          # 4. [핵심] sudo가 가상환경의 PATH를 인식하도록 -E 옵션 사용
          # 또는 직접 경로를 지정하여 시스템 라이브러리 설치
          sudo -E ./venv/bin/python -m playwright install-deps

      - name: 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          source venv/bin/activate
          python scheduler.py