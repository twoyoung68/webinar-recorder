name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 통합 라이브러리 및 브라우저 설치
        run: |
          # 1. pip 최신화 및 핵심 라이브러리 강제 설치
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright supabase firebase-admin python-dotenv pytz
          
          # 2. requirements.txt가 있다면 추가 설치
          if [ -f requirements.txt ]; then python3 -m pip install -r requirements.txt; fi
          
          # 3. 브라우저 및 의존성 설치 (python3 -m 사용으로 경로 고정)
          python3 -m playwright install chromium
          sudo python3 -m playwright install-deps

      - name: 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # 실행 시에도 python3를 명시하여 설치된 라이브러리를 정확히 찾게 함
        run: python3 scheduler.py