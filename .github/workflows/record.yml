name: Global Webinar Recorder Scheduler

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 1. 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright supabase firebase-admin python-dotenv pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 2. Playwright 브라우저 및 의존성 설치 (공식 방식)
        # 파이썬 경로 문제를 피하기 위해 npx(노드 실행기)로 브라우저를 직접 설치합니다.
        run: npx playwright install chromium --with-deps

      - name: 3. 예약 확인 및 녹화 엔진 가동
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # $(which python)을 사용하여 현재 환경의 '진짜 파이썬'을 찾아 실행합니다.
          $(which python) scheduler.py