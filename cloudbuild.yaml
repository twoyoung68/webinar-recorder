steps:
  # [1단계] Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/webinar-recorder', '.']

  # [2단계] 이미지 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/webinar-recorder']

  # [3단계] Cloud Run 배포 (Secret Manager와 직접 연동)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'webinar-recorder'
      - '--image'
      - 'gcr.io/$PROJECT_ID/webinar-recorder'
      - '--region'
      - 'asia-northeast3'
      - '--platform'
      - 'managed'
      # 아래 설정을 통해 Secret Manager의 값을 환경 변수로 자동 매핑합니다.
      # 형식: 환경변수명=시크릿이름:버전
      - '--set-secrets'
      - 'FIREBASE_KEY=FIREBASE_KEY:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_KEY=SUPABASE_KEY:latest'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY