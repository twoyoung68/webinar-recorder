steps:
  # [1단계] Docker 이미지를 빌드합니다.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/webinar-recorder', '.']

  # [2단계] 빌드된 이미지를 구글 컨테이너 저장소(GCR)에 저장합니다.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/webinar-recorder']

  # [3단계] Cloud Run에 서비스를 배포합니다.
  # 보안을 위해 --env-vars-file env.yaml 부분은 완전히 삭제했습니다.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'webinar-recorder'
      - '--image'
      - 'gcr.io/$PROJECT_ID/webinar-recorder'
      - '--region'
      - 'asia-northeast3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# 빌드 기록(로그) 에러를 방지하기 위한 설정입니다.
options:
  logging: CLOUD_LOGGING_ONLY